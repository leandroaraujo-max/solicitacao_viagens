<style>
/* ── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:    #0086FF;
  --yellow:  #FFCE00;
  --bg:      #F5F5F5;
  --text:    #333333;
  --green:   #2e7d32;
  --red:     #c62828;
  --border:  #E0E0E0;
  --shadow:  0 2px 8px rgba(0,0,0,0.08);
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
}

/* ── Header ──────────────────────────────────────────────── */
.header {
  background: var(--blue);
  padding: 0 24px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: 860px; margin: auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  color: #fff; font-size: 18px; font-weight: 700;
}
.logo-icon { font-size: 22px; }
.badge-magalu {
  background: var(--yellow); color: var(--text);
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
}

/* ── Container ───────────────────────────────────────────── */
.container {
  max-width: 860px; margin: 32px auto;
  padding: 0 16px;
  display: flex; flex-direction: column; gap: 20px;
}

/* ── Card ────────────────────────────────────────────────── */
.card {
  background: #fff;
  border-radius: 10px;
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.card-inner {
  background: var(--bg);
  border-radius: 8px;
  padding: 20px;
  margin-top: 16px;
}
.card-title {
  font-size: 18px; font-weight: 700;
  color: var(--blue); margin-bottom: 20px;
  padding-bottom: 12px; border-bottom: 2px solid var(--border);
}

/* ── Formulário ──────────────────────────────────────────── */
.field-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field-group label { font-weight: 600; font-size: 14px; color: #555; }
.field-hint { font-size: 12px; color: #888; }
.req { color: var(--red); }

input[type="text"],
input[type="number"],
input[type="date"],
input[type="datetime-local"],
input[type="url"],
input[type="email"],
input[type="file"],
select,
textarea {
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 15px;
  font-family: inherit;
  color: var(--text);
  background: #fff;
  transition: border-color 0.2s;
  width: 100%;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0,134,255,0.12);
}
input[readonly] { background: #f5f5f5; color: #888; cursor: default; }

.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* ── Radio e Checkbox ────────────────────────────────────── */
.radio-group, .check-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 4px; }
.radio-opt, .check-opt {
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; font-weight: 400;
}
.radio-opt input, .check-opt input { width: auto; cursor: pointer; }
.check-opt.destaque { font-weight: 600; color: var(--blue); }

/* ── Botões ──────────────────────────────────────────────── */
.btn-primary {
  background: var(--blue); color: #fff;
  border: none; border-radius: 6px;
  padding: 12px 28px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background 0.2s;
  width: 100%; margin-top: 8px;
}
.btn-primary:hover  { background: #006ecc; }
.btn-primary:disabled { background: #b0bec5; cursor: not-allowed; }

.btn-secondary {
  background: #fff; color: var(--blue);
  border: 2px solid var(--blue); border-radius: 6px;
  padding: 10px 20px; font-size: 14px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  transition: all 0.2s;
}
.btn-secondary:hover { background: var(--blue); color: #fff; }

.btn-outline {
  background: transparent; color: #666;
  border: 2px solid var(--border); border-radius: 6px;
  padding: 12px 24px; font-size: 15px; font-weight: 600;
  cursor: pointer;
}

.btn-row { display: flex; gap: 12px; margin-top: 8px; }
.btn-row .btn-primary { flex: 1; margin-top: 0; }

/* ── Alertas e Info ──────────────────────────────────────── */
.alert {
  border-radius: 6px; padding: 12px 16px;
  font-size: 14px; margin: 8px 0;
  background: #fff3e0; border-left: 4px solid #ff9800; color: #e65100;
}
.alert-info  { background: #e3f2fd; border-left-color: var(--blue); color: #1565c0; }
.alert-erro  { background: #ffebee; border-left-color: var(--red);  color: var(--red); }
.alert.hidden { display: none; }

.info-box {
  background: #f0f7ff; border: 1px solid #90caf9;
  border-radius: 6px; padding: 12px 16px;
  font-size: 14px; line-height: 1.6;
}
.info-box.erro { background: #ffebee; border-color: #ef9a9a; }

/* ── Perfil Viajante ─────────────────────────────────────── */
.perfil-box { margin-bottom: 20px; }
.perfil-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px; background: #f0f7ff; border-radius: 8px; padding: 16px;
}
.perfil-grid span { display: flex; flex-direction: column; gap: 2px; }
.perfil-grid label { font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 0.5px; }
.perfil-grid strong { font-size: 14px; }
.txt-individual { color: var(--blue); }

/* ── Badges ──────────────────────────────────────────────── */
.badge {
  display: inline-block; border-radius: 20px;
  padding: 6px 14px; font-size: 13px; font-weight: 700;
}
.badge.hidden { display: none; }
.badge-comum       { background: #e8f5e9; color: var(--green); }
.badge-emergencial { background: #ffebee; color: var(--red); }

.categoria-badge {
  background: #e3f2fd; border-radius: 6px;
  padding: 8px 12px; font-size: 13px; font-weight: 600;
  color: var(--blue); margin-bottom: 12px;
}

/* ── Exceção / Laudo ─────────────────────────────────────── */
.excecao-form {
  margin-top: 12px; padding: 16px;
  background: #fff; border: 1.5px solid #90caf9;
  border-radius: 8px;
}

/* ── Sucesso ─────────────────────────────────────────────── */
.sucesso-box { text-align: center; padding: 32px 16px; }
.sucesso-icon { font-size: 56px; margin-bottom: 16px; }
.sucesso-box h2 { font-size: 22px; margin-bottom: 8px; }
.sucesso-box p  { color: #555; margin-bottom: 8px; }

/* ── Utilitários ─────────────────────────────────────────── */
.hidden { display: none !important; }

/* ── Responsivo ──────────────────────────────────────────── */
@media (max-width: 600px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .btn-row          { flex-direction: column; }
  .card             { padding: 18px; }
}
/* ── Amadeus — Cards de resultados ───────────────────────── */
.amadeus-card {
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  background: #fafafa;
}
.amadeus-card:hover { border-color: var(--blue); background: #f0f7ff; }
.amadeus-card-ativo { border-color: var(--blue); background: #e3f2fd; border-width: 2px; }
.btn-trecho {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--blue);
  background: #fff;
  color: var(--blue);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, color .15s;
}
.btn-trecho:hover { background: #e3f2fd; }
.btn-trecho-ativo { background: var(--blue); color: #fff; }
.amadeus-preco { font-weight: bold; color: #2e7d32; font-size: 15px; }
.amadeus-sugestoes {
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fff;
  max-height: 200px;
  overflow-y: auto;
  z-index: 100;
  position: absolute;
  width: 100%;
  box-shadow: 0 4px 12px rgba(0,0,0,.12);
}
.amadeus-sug-item {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid #f0f0f0;
}
.amadeus-sug-item:hover { background: #f0f7ff; }
.amadeus-resultados { max-height: 340px; overflow-y: auto; margin-top: 8px; }
.amadeus-selecionado-badge {
  background: #e8f5e9;
  border: 1px solid #a5d6a7;
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 13px;
  margin-top: 8px;
}
.field-group { position: relative; }

/* ── Loading button (B2) ─────────────────────────────────── */
.btn-spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Barra de progresso global (loader) ──────────────────── */
#barra-loading {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
  height: 3px; background: transparent; pointer-events: none;
  overflow: hidden;
}
#barra-loading::after {
  content: ''; position: absolute; top: 0;
  left: -45%; width: 45%; height: 100%;
  background: var(--yellow);
  box-shadow: 0 0 12px var(--yellow), 0 0 6px rgba(255,206,0,0.6);
  border-radius: 0 3px 3px 0;
  animation: none;
}
#barra-loading.ativo::after { animation: barraSlide 1.3s ease-in-out infinite; }
@keyframes barraSlide {
  0%   { left: -45%; }
  100% { left: 110%; }
}
/* Toast de status */
#toast-loading {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: rgba(20,20,20,0.90); color: #fff;
  padding: 10px 20px; border-radius: 24px; font-size: 13px;
  display: none; z-index: 9998;
  align-items: center; gap: 10px; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.toast-spinner {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.25);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* ── Campos radio inline ─────────────────────────────────── */
.radio-group { display: flex; flex-direction: column; gap: 6px; }
.radio-opt { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 14px; }

/* ── Alerta noturno rodoviário ───────────────────────────── */
.alert-info {
  background: #fff8e1;
  border: 1px solid #ffe082;
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 14px;
  color: #795548;
}

/* ── Badge distância (D1) ────────────────────────────────── */
.badge-distancia-ok  { background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; }
.badge-distancia-nok { background:#fff3e0; color:#e65100; border:1px solid #ffcc80; }

/* ── Destaque check option ───────────────────────────────── */
.check-opt.destaque {
  font-weight: 600;
  padding: 6px 10px;
  background: #fff8e1;
  border-radius: 6px;
  border: 1px solid #ffe082;
}

/* ── Card interno ────────────────────────────────────────── */
.card-inner {
  background: #fafafa;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.card-inner h3 { font-size: 15px; margin-bottom: 12px; color: #333; }

/* ── Field hint ──────────────────────────────────────────── */
.field-hint { font-size: 12px; color: #888; display: block; margin-top: 4px; }

/* ── Tabs de navegação ───────────────────────────────────── */
.nav-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid #e0e0e0; }
.nav-tab { padding: 12px 24px; font-size: 14px; font-weight: 600; color: #666; cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; transition: all 0.2s; }
.nav-tab:hover { color: #0086FF; }
.nav-tab.active { color: #0086FF; border-bottom-color: #0086FF; }

/* ── Cards de solicitação (histórico) ────────────────────── */
.req-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.req-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.req-card-id { font-weight: 700; color: #0086FF; font-size: 15px; }
.req-card-destino { font-size: 14px; color: #333; }
.req-card-datas { font-size: 12px; color: #888; }
.req-card-servicos { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
.req-card-servicos span { background: #e3f2fd; color: #1565c0; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: 600; }

/* ── Badge de status ─────────────────────────────────────── */
.status-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 12px; white-space: nowrap; }
.status-badge.pendente { background: #fff3e0; color: #e65100; }
.status-badge.aprovado { background: #e8f5e9; color: #2e7d32; }
.status-badge.reprovado { background: #ffebee; color: #c62828; }
.status-badge.concluido { background: #e3f2fd; color: #1565c0; }
.status-badge.cotacao { background: #f3e5f5; color: #7b1fa2; }

/* ── Timeline visual ─────────────────────────────────────── */
.timeline { display: flex; align-items: flex-start; gap: 0; margin-top: 16px; overflow-x: auto; padding-bottom: 4px; }
.tl-step { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 80px; position: relative; }
.tl-step::before { content: ''; position: absolute; top: 14px; left: -50%; right: 50%; height: 3px; background: #e0e0e0; z-index: 0; }
.tl-step:first-child::before { display: none; }
.tl-step.done::before { background: #2e7d32; }
.tl-step.active::before { background: #0086FF; }
.tl-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; z-index: 1; border: 2px solid #e0e0e0; background: #fff; color: #bbb; }
.tl-step.done .tl-dot { background: #2e7d32; color: #fff; border-color: #2e7d32; }
.tl-step.active .tl-dot { background: #0086FF; color: #fff; border-color: #0086FF; animation: pulse 1.5s infinite; }
.tl-step.fail .tl-dot { background: #c62828; color: #fff; border-color: #c62828; }
.tl-label { font-size: 10px; color: #888; margin-top: 6px; text-align: center; line-height: 1.2; }
.tl-step.done .tl-label { color: #2e7d32; font-weight: 600; }
.tl-step.active .tl-label { color: #0086FF; font-weight: 600; }
.tl-step.fail .tl-label { color: #c62828; font-weight: 600; }
.tl-date { font-size: 9px; color: #aaa; margin-top: 2px; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,134,255,0.3); } 50% { box-shadow: 0 0 0 8px rgba(0,134,255,0); } }

/* ── Empty state ─────────────────────────────────────────── */
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-state h3 { color: #666; margin-bottom: 8px; }
</style>
