<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Setor de Viagens — Magalu</title>
  <?!= include('Estilos'); ?>
  <style>
    /* ── Portal Setor — estilos específicos ─────────────────── */
    .header { background: #1a1a2e; }
    .badge-setor {
      background: #FFCE00; color: #1a1a2e;
      padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.5px;
    }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .btn-nova-solicitacao {
      background: #FFCE00; color: #1a1a2e;
      border: none; border-radius: 6px;
      padding: 7px 14px; font-size: 13px; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-block;
    }
    .btn-nova-solicitacao:hover { background: #ffd633; }

    /* ── Tabs ────────────────────────────────────────────────── */
    .tabs {
      display: flex; gap: 0;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px 22px; font-size: 14px; font-weight: 600;
      background: none; border: none; cursor: pointer;
      color: #888; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: all 0.2s;
    }
    .tab-btn.active { color: #0086FF; border-bottom-color: #0086FF; }
    .tab-btn:hover:not(.active) { color: #555; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Filtros ─────────────────────────────────────────────── */
    .filtros {
      display: flex; flex-wrap: wrap; gap: 10px;
      align-items: flex-end; margin-bottom: 16px;
    }
    .filtros .field-group { margin-bottom: 0; flex: 1; min-width: 140px; }
    .filtros select, .filtros input { font-size: 13px; padding: 8px 10px; }
    .btn-filtrar {
      background: #0086FF; color: #fff; border: none; border-radius: 6px;
      padding: 9px 18px; font-weight: 600; font-size: 13px;
      cursor: pointer; white-space: nowrap;
    }
    .btn-filtrar:hover { background: #006fd1; }
    .btn-limpar {
      background: #eee; color: #555; border: none; border-radius: 6px;
      padding: 9px 14px; font-weight: 600; font-size: 13px;
      cursor: pointer;
    }

    /* ── Tabela ──────────────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #f0f4ff; }
    th { padding: 10px 12px; text-align: left; font-weight: 700; color: #444;
         white-space: nowrap; border-bottom: 2px solid #dde3f0; }
    td { padding: 9px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
    tr:hover td { background: #f8faff; }
    .req-id { font-family: monospace; font-weight: 700; color: #0086FF; font-size: 12px; }
    .viajante-nome { font-weight: 600; }
    .viajante-info { font-size: 11px; color: #888; }

    /* ── Badges de status ────────────────────────────────────── */
    .badge {
      display: inline-block; padding: 3px 9px; border-radius: 12px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .badge-pendente-lideranca { background: #e3f2fd; color: #1565c0; }
    .badge-pendente-setor     { background: #fff3e0; color: #e65100; }
    .badge-aguardando-cotacao { background: #f3e5f5; color: #6a1b9a; }
    .badge-cotacao-parcial    { background: #fce4ec; color: #880e4f; }
    .badge-pendente-aprov-setor { background: #fffde7; color: #f57f17; }
    .badge-aprovada-voucher   { background: #e8f5e9; color: #1b5e20; }
    .badge-concluida          { background: #e8f5e9; color: #2e7d32; }
    .badge-reprovada          { background: #ffebee; color: #b71c1c; }
    .badge-emergencial        { background: #ffebee; color: #c62828; }
    .badge-comum              { background: #e8eaf6; color: #283593; }

    /* ── Botões de ação ──────────────────────────────────────── */
    .acoes { display: flex; gap: 6px; flex-wrap: nowrap; align-items: center; }
    .btn-acao {
      padding: 6px 12px; border-radius: 6px; font-size: 12px;
      font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-acao:hover { opacity: 0.85; }
    .btn-pre-aprovar  { background: #43a047; color: #fff; }
    .btn-reprovar     { background: #e53935; color: #fff; }
    .btn-tastur       { background: #1976d2; color: #fff; }
    .btn-kontrip      { background: #7b1fa2; color: #fff; }
    .btn-reenviar     { background: #f57c00; color: #fff; }
    .btn-detalhe      { background: #eee; color: #333; }

    /* ── Cards de indicadores ────────────────────────────────── */
    .indicadores-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .kpi-card {
      background: #fff; border-radius: 10px; padding: 20px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-left: 4px solid #0086FF;
      border: 1px solid #e8eef8;
    }
    .kpi-card.yellow  { border-left-color: #FFCE00; }
    .kpi-card.orange  { border-left-color: #f57c00; }
    .kpi-card.green   { border-left-color: #43a047; }
    .kpi-card.red     { border-left-color: #e53935; }
    .kpi-card.purple  { border-left-color: #7b1fa2; }
    .kpi-label  { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 600; }
    .kpi-value  { font-size: 28px; font-weight: 800; color: #1a1a2e; }
    .kpi-sub    { font-size: 11px; color: #aaa; margin-top: 2px; }

    /* ── Gráficos simples ────────────────────────────────────── */
    .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 600px) { .chart-section { grid-template-columns: 1fr; } }
    .chart-card { background: #fff; border-radius: 10px; padding: 20px;
                  border: 1px solid #e0e0e0; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    .chart-title { font-size: 14px; font-weight: 700; color: #444; margin-bottom: 14px; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
    .bar-label { width: 120px; text-align: right; color: #555; white-space: nowrap;
                 overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: #f0f2f5; border-radius: 4px; height: 16px; }
    .bar-fill  { height: 16px; border-radius: 4px; background: #0086FF;
                 transition: width 0.4s; min-width: 2px; }
    .bar-count { width: 30px; font-weight: 700; color: #333; }

    /* ── Modal de detalhes ───────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; padding: 28px;
      max-width: 680px; width: 95%; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 18px; font-weight: 700; color: #0086FF; }
    .modal-close {
      background: none; border: none; font-size: 22px; cursor: pointer;
      color: #888; padding: 0; line-height: 1;
    }
    .detail-section { margin-bottom: 16px; }
    .detail-section-title {
      font-size: 12px; font-weight: 800; color: #888; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 4px;
      border-bottom: 1px solid #eee;
    }
    .detail-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
    .detail-item  { font-size: 13px; }
    .detail-label { color: #888; font-size: 11px; }
    .detail-value { font-weight: 600; color: #333; }
    .cotacao-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .cotacao-box  {
      background: #f8f9ff; border-radius: 8px; padding: 12px;
      border: 1px solid #dde4ff;
    }
    .cotacao-box.melhor { border-color: #43a047; background: #f1faf1; }
    .cotacao-nome { font-weight: 700; font-size: 13px; color: #333; margin-bottom: 8px; }
    .cotacao-linha { font-size: 12px; color: #555; margin-bottom: 3px; }
    .cotacao-total {
      font-size: 15px; font-weight: 800; color: #0086FF;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid #dde4ff;
    }
    .modal-acoes { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px;
                   padding-top: 16px; border-top: 2px solid #eee; }

    /* ── Toast ───────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1a1a2e; color: #fff;
      padding: 14px 20px; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      z-index: 2000; opacity: 0; transform: translateY(20px);
      transition: all 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-left: 4px solid #43a047; }
    .toast.error   { border-left: 4px solid #e53935; }

    /* ── Loading ─────────────────────────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; color: #888; gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px; border: 2px solid #ddd;
      border-top-color: #0086FF; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center; padding: 48px 20px; color: #aaa;
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .container { max-width: 1200px; }

    /* ── Contagem ────────────────────────────────────────────── */
    .tbl-info { font-size: 12px; color: #888; margin-bottom: 8px; }
  </style>
</head>

<script>
  // ── Dados injetados pelo GAS ──────────────────────────────
  const SESSION_TOKEN = '<?= sessionToken ?>';
  const SESSION_EMAIL = '<?= sessionEmail ?>';
  const SESSION_CPF   = '<?= sessionCpf ?>';
  const WEBAPP_URL    = '<?= webAppUrl ?>';

  let _todasSolicitacoes = [];  // cache local
  let _reqAtual = null;          // req selecionada no modal

  // ── Utilitários ───────────────────────────────────────────
  function run(acao, payload) {
    return new Promise(function(resolve, reject) {
      google.script.run
        .withSuccessHandler(function(r) {
          if (r && r.sucesso === false) reject(new Error(r.erro || 'Erro desconhecido'));
          else resolve(r && r.dados !== undefined ? r.dados : r);
        })
        .withFailureHandler(function(e) { reject(e); })
        .doPost_proxy(Object.assign({ acao: acao }, payload || {}));
    });
  }

  function showToast(msg, tipo) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (tipo || 'success') + ' show';
    setTimeout(function() { t.classList.remove('show'); }, 3500);
  }

  function fmtData(val) {
    if (!val) return '—';
    const d = new Date(val);
    if (isNaN(d)) return '—';
    return d.toLocaleDateString('pt-BR');
  }

  function fmtBRL(val) {
    const n = Number(val);
    if (!n) return '—';
    return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
  }

  function badgeStatus(status) {
    // F2.2: rótulos simplificados — remove redundância "Pendente" onde o contexto já é claro
    const statusLabel = {
      'Pendente Aprovação Liderança':  'Aprovação Liderança',
      'Pendente Pré-Aprovação Setor':  'Pré-Aprovação Setor',
      'Aguardando Cotação':            'Aguardando Cotação',
      'Cotação Parcial':               'Cotação Parcial',
      'Pendente Aprovação Setor':      'Aprovação Setor',
      'Aprovada / Aguardando Voucher': 'Aprovada / Ag. Voucher',
      'Concluída':                     'Concluída',
      'Reprovada':                     'Reprovada',
    };
    const map = {
      'Pendente Aprovação Liderança':    'badge-pendente-lideranca',
      'Pendente Pré-Aprovação Setor':    'badge-pendente-setor',
      'Aguardando Cotação':              'badge-aguardando-cotacao',
      'Cotação Parcial':                 'badge-cotacao-parcial',
      'Pendente Aprovação Setor':        'badge-pendente-aprov-setor',
      'Aprovada / Aguardando Voucher':   'badge-aprovada-voucher',
      'Concluída':                       'badge-concluida',
      'Reprovada':                       'badge-reprovada',
    };
    const cls   = map[status] || 'badge-comum';
    const label = statusLabel[status] || status || '—';
    return '<span class="badge ' + cls + '">' + label + '</span>';
  }

  // ── Tabs ──────────────────────────────────────────────────
  function trocarAba(id, btn) {
    document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('aba-' + id).classList.add('active');
    if (btn) btn.classList.add('active');
    if (id === 'indicadores' && _todasSolicitacoes.length > 0) renderIndicadores();
  }

  // ── SOLICITAÇÕES ──────────────────────────────────────────
  function limparFiltros() {
    document.getElementById('filtroStatus').value  = '';
    document.getElementById('filtroPeriodo').value = '30';
    document.getElementById('filtroAgencia').value = '';
    document.getElementById('filtroBusca').value   = '';
    carregarSolicitacoes();
  }

  function carregarSolicitacoes() {
    const status  = document.getElementById('filtroStatus').value;
    const periodo = document.getElementById('filtroPeriodo').value;
    const agencia = document.getElementById('filtroAgencia').value;
    document.getElementById('tblBody').innerHTML =
      '<tr><td colspan="7"><div class="loading"><div class="spinner"></div> Carregando...</div></td></tr>';

    run('listarTodasSolicitacoes', {
      filtros: {
        status:  status  || undefined,
        periodo: periodo ? parseInt(periodo) : 0,
        agencia: agencia || undefined,
      }
    }).then(function(lista) {
      _todasSolicitacoes = lista || [];
      renderTabela(_todasSolicitacoes);
    }).catch(function(e) {
      document.getElementById('tblBody').innerHTML =
        '<tr><td colspan="7" style="color:red;padding:20px">Erro: ' + e.message + '</td></tr>';
    });
  }

  function renderTabela(lista) {
    const busca = (document.getElementById('filtroBusca').value || '').toLowerCase();
    const filtrada = busca
      ? lista.filter(function(r) {
          return (r.req_id || '').toLowerCase().includes(busca) ||
                 (r.nome_viajante || '').toLowerCase().includes(busca);
        })
      : lista;

    const tblInfo = document.getElementById('tblInfo');
    tblInfo.textContent = filtrada.length + ' solicitação(ões) encontrada(s)';

    if (filtrada.length === 0) {
      document.getElementById('tblBody').innerHTML =
        '<tr><td colspan="7"><div class="empty-state">' +
        '<div class="empty-state-icon">&#128196;</div>' +
        '<div>Nenhuma solicitação encontrada para os filtros selecionados.</div>' +
        '</div></td></tr>';
      return;
    }

    const linhas = filtrada.map(function(r) {
      const acoes = montarBotoesAcao(r);
      // Função para Title Case
      const formatarNome = (s) => (s||'').toLowerCase().replace(/(?:^|\s)\S/g, l => l.toUpperCase());
      const emailLower = (r.email || '').toLowerCase();
      const servicosExibicao = (r.tipo_servico || '—').replace(/,/g, ', ');

      return '<tr>' +
        '<td style="white-space:nowrap"><div class="req-id">' + r.req_id + '</div>' +
          '<div class="viajante-info">' + fmtData(r.criado_em) + '</div>' +
          (r.classificacao_aereo === 'Emergencial'
            ? '<span class="badge badge-emergencial" style="font-size:10px; margin-top:4px">EMERG.</span>' : '') +
        '</td>' +
        '<td><div class="viajante-nome">' + (formatarNome(r.nome_viajante) || '—') + '</div>' +
          '<div class="viajante-info" style="word-break: break-all; max-width: 180px;">' + emailLower + '</div>' +
        '</td>' +
        '<td style="min-width: 100px;">' + (formatarNome(r.destino_cidade) || '—') + (r.destino_estado ? ', ' + r.destino_estado.toUpperCase() : '') + '</td>' +
        '<td style="white-space:nowrap">' + fmtData(r.data_ida) + '</td>' +
        '<td style="color:#555; font-size:11px; max-width:140px;">' + servicosExibicao + '</td>' +
        '<td>' + badgeStatus(r.status) + '</td>' +
        '<td><div class="acoes">' + acoes + '</div></td>' +
        '</tr>';
    }).join('');

    document.getElementById('tblBody').innerHTML = linhas;
  }

  function montarBotoesAcao(r) {
    let btns = '<button class="btn-acao btn-detalhe" onclick="abrirModal(\'' + r.req_id + '\')">Detalhe</button>';

    if (r.status === 'Pendente Pré-Aprovação Setor') {
      btns += '<button class="btn-acao btn-pre-aprovar" onclick="executarAcao(\'' + r.req_id + '\',\'PreAprovaViagem\')">Pré-Aprovar</button>';
      btns += '<button class="btn-acao btn-reprovar"  onclick="executarAcao(\'' + r.req_id + '\',\'PreReprovaViagem\')">Reprovar</button>';
    }
    if (r.status === 'Aguardando Cotação' || r.status === 'Cotação Parcial') {
      btns += '<button class="btn-acao btn-reenviar" onclick="reenviarAgencias(\'' + r.req_id + '\')">Reenviar E-mail</button>';
    }
    if (r.status === 'Pendente Aprovação Setor') {
      btns += '<button class="btn-acao btn-tastur"  onclick="executarAcao(\'' + r.req_id + '\',\'AprovaTastur\')">Tastur</button>';
      btns += '<button class="btn-acao btn-kontrip" onclick="executarAcao(\'' + r.req_id + '\',\'AprovaKontrip\')">Kontrip</button>';
      btns += '<button class="btn-acao btn-reprovar" onclick="executarAcao(\'' + r.req_id + '\',\'Reprova\')">Reprovar</button>';
    }
    return btns;
  }

  // ── Ações do setor ────────────────────────────────────────
  function executarAcao(reqID, decisao) {
    const labels = {
      PreAprovaViagem:   'pré-aprovar e liberar para cotação',
      PreReprovaViagem:  'reprovar esta solicitação (antes das cotações)',
      AprovaTastur:      'escolher Tastur como agência vencedora',
      AprovaKontrip:     'escolher Kontrip como agência vencedora',
      Reprova:           'reprovar esta solicitação',
    };
    if (!confirm('Confirma: ' + (labels[decisao] || decisao) + ' para ' + reqID + '?')) return;

    run('executarAcaoSetor', { reqID: reqID, decisao: decisao, emailSetor: SESSION_EMAIL })
      .then(function() {
        showToast('Ação executada com sucesso!', 'success');
        fecharModal();
        carregarSolicitacoes();
      })
      .catch(function(e) { showToast('Erro: ' + e.message, 'error'); });
  }

  function reenviarAgencias(reqID) {
    if (!confirm('Reenviar e-mail de cotação para Tastur e Kontrip para ' + reqID + '?')) return;
    run('reenviarEmailAgencias', { reqID: reqID })
      .then(function() { showToast('E-mails reenviados!', 'success'); })
      .catch(function(e) { showToast('Erro: ' + e.message, 'error'); });
  }

  // ── Modal de detalhes ─────────────────────────────────────
  function abrirModal(reqID) {
    _reqAtual = _todasSolicitacoes.find(function(r) { return r.req_id === reqID; });
    if (!_reqAtual) return;
    const r = _reqAtual;

    document.getElementById('modalReqId').textContent = r.req_id;
    document.getElementById('modalStatus').innerHTML = badgeStatus(r.status);

    // Calcula totais das cotações
    function totalCotacao(prefixo) {
      const aero  = Number(r[prefixo + '_aero_valor'])  || 0;
      const hotel = Number(r[prefixo + '_hotel_total']) || 0;
      const carro = Number(r[prefixo + '_carro_valor']) || 0;
      return aero + hotel + carro;
    }
    const totTastur  = totalCotacao('cotacao_tastur');
    const totKontrip = totalCotacao('cotacao_kontrip');
    const melhorTastur  = totTastur  > 0 && (totTastur  <= totKontrip || totKontrip === 0);
    const melhorKontrip = totKontrip > 0 && (totKontrip <  totTastur  || totTastur  === 0);

    let body = '';

    // Dados do Viajante
    body += '<div class="detail-section">' +
      '<div class="detail-section-title">Viajante</div>' +
      '<div class="detail-grid">' +
      di('Nome',          r.nome_viajante) +
      di('E-mail',        r.email) +
      di('CPF',           r.cpf_viajante) +
      di('Matrícula',     r.matricula_viajante) +
      di('Centro de Custo', r.cod_centro_custo) +
      di('Operador (Em nome de)', r.nome_operador && r.nome_operador !== r.nome_viajante ? r.nome_operador : '') +
      '</div></div>';

    // Dados Gerais da Viagem
    body += '<div class="detail-section">' +
      '<div class="detail-section-title">Detalhes Gerais da Viagem</div>' +
      '<div class="detail-grid">' +
      di('Tipo de Serviço',  r.tipo_servico) +
      di('Origem',           (r.origem_cidade || '') + (r.origem_estado ? ', ' + r.origem_estado : '')) +
      di('Destino',          (r.destino_cidade || '') + (r.destino_estado ? ', ' + r.destino_estado : '')) +
      di('Data Ida',         fmtData(r.data_ida)) +
      di('Data Volta',       fmtData(r.data_volta)) +
      di('Classificação',    r.classificacao_aereo) +
      di('Motivo',           r.motivo_viagem) +
      di('Observações',      r.observacoes_viajante) +
      di('Liderança',        (r.aprovador_n1_nome || '—') + (r.aprovador_n1_acao ? ' (' + r.aprovador_n1_acao + ')' : '')) +
      di('Antecedência',     r.antecedencia_dias ? r.antecedencia_dias + ' dias' : '') +
      di('Criado em',        fmtData(r.criado_em)) +
      '</div></div>';

    // Normaliza tipo_servico para comparação sem sensibilidade a acento
    // Valores gravados na Sheet: "Aereo", "Rodoviario" (sem acento)
    var _ts = (r.tipo_servico || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    var temAereo  = _ts.includes('aereo');
    var temRodov  = _ts.includes('rodoviario') || _ts.includes('rodovi');
    var temHosp   = _ts.includes('hospedagem');
    var temCarro  = _ts.includes('carro');

    // Aéreo
    if (temAereo) {
      body += '<div class="detail-section">' +
        '<div class="detail-section-title">Detalhes GDC / Aéreo</div>' +
        '<div class="detail-grid">' +
        di('Período Preferido', r.aereo_periodo_preferido) +
        di('Tipo Trecho', r.aereo_tipo_trecho) +
        di('Bagagem Extra', String(r.bagagem_extra) === 'true' ? 'Sim' : 'Não') +
        di('Assento Especial', r.assento_especial ? r.assento_especial + (r.motivo_assento_especial ? ' (' + r.motivo_assento_especial + ')' : '') : '') +
        di('Preferência Cia', r.preferencia_voo_cia) +
        di('Preferência Voo', r.preferencia_voo_numero) +
        di('Saída Pref.', r.preferencia_voo_saida) +
        di('Chegada Pref.', r.preferencia_voo_chegada) +
        '</div></div>';
    }

    // Rodoviário
    if (temRodov) {
      body += '<div class="detail-section">' +
        '<div class="detail-section-title">Detalhes Rodoviário</div>' +
        '<div class="detail-grid">' +
        di('Ida', fmtData(r.rodov_data_ida)) +
        di('Volta', fmtData(r.rodov_data_volta)) +
        di('Período', r.rodov_periodo_preferido) +
        di('Tipo Ônibus', r.rodov_tipo_onibus) +
        di('Elegibilidade Aéreo', r.aereo_elegivel) +
        di('Distância Rota', r.distancia_km ? r.distancia_km + ' km' : '') +
        '</div></div>';
    }

    // Hospedagem
    if (temHosp) {
      body += '<div class="detail-section">' +
        '<div class="detail-section-title">Detalhes Hospedagem</div>' +
        '<div class="detail-grid">' +
        di('Quarto Solicitado', r.quarto_tipo_solicitado) +
        di('Preferência Nome', r.preferencia_hotel_nome) +
        '</div></div>';
    }

    // Carro
    if (temCarro) {
      var retirada  = (r.carro_cidade_retirada  || '') + (r.carro_hora_retirada  ? ' às ' + r.carro_hora_retirada  : '');
      var devolucao = (r.carro_cidade_devolucao || '') + (r.carro_hora_devolucao ? ' às ' + r.carro_hora_devolucao : '');
      body += '<div class="detail-section">' +
        '<div class="detail-section-title">Detalhes Carro</div>' +
        '<div class="detail-grid">' +
        di('Tipo Solicitado', r.veiculo_tipo_solicitado) +
        di('Retirada', retirada) +
        di('Devolução', devolucao) +
        ((!retirada && !devolucao && !r.veiculo_tipo_solicitado)
          ? '<div class="detail-item" style="grid-column:1/-1;color:#999;font-size:12px">Detalhes não informados na solicitação</div>'
          : '') +
        '</div></div>';
    }

    // Condições Especiais de Saúde
    if (String(r.quarto_excecao_saude) === 'true' || r.excecao_motivo || r.excecao_pre_aprovada) {
      body += '<div class="detail-section">' +
        '<div class="detail-section-title">Condições de Exceção/Saúde</div>' +
        '<div class="detail-grid">' +
        di('Quarto Exceção', String(r.quarto_excecao_saude) === 'true' ? 'Sim' : 'Não') +
        di('Pré-Aprovado', String(r.excecao_pre_aprovada) === 'true' ? 'Sim' : '') +
        di('Motivo', r.excecao_motivo) +
        di('CID', r.excecao_cid) +
        di('Validade Laudo', r.excecao_validade) +
        di('Obs', r.excecao_obs) +
        (r.excecao_laudo_link ? di('Laudo', '<a href="'+r.excecao_laudo_link+'" target="_blank">Visualizar Laudo</a>') : '') +
        '</div></div>';
    }

    // Cotações (se disponíveis)
    if (r.cotacao_tastur_enviado_em || r.cotacao_kontrip_enviado_em) {
      body += '<div class="detail-section">' +
        '<div class="detail-section-title">Cotações</div>' +
        '<div class="cotacao-grid">';

      if (r.cotacao_tastur_enviado_em) {
        body += '<div class="cotacao-box' + (melhorTastur ? ' melhor' : '') + '">' +
          '<div class="cotacao-nome">Tastur' + (melhorTastur ? ' &#9733; Menor' : '') + '</div>' +
          cl('Aéreo', fmtBRL(r.cotacao_tastur_aero_valor)) +
          cl('Hospedagem', fmtBRL(r.cotacao_tastur_hotel_total)) +
          cl('Carro', fmtBRL(r.cotacao_tastur_carro_valor)) +
          '<div class="cotacao-total">Total: ' + (totTastur ? fmtBRL(totTastur) : '—') + '</div>' +
          '</div>';
      } else {
        body += '<div class="cotacao-box"><div class="cotacao-nome">Tastur</div>' +
          '<div style="color:#aaa;font-size:12px">Cotação pendente</div></div>';
      }

      if (r.cotacao_kontrip_enviado_em) {
        body += '<div class="cotacao-box' + (melhorKontrip ? ' melhor' : '') + '">' +
          '<div class="cotacao-nome">Kontrip' + (melhorKontrip ? ' &#9733; Menor' : '') + '</div>' +
          cl('Aéreo', fmtBRL(r.cotacao_kontrip_aero_valor)) +
          cl('Hospedagem', fmtBRL(r.cotacao_kontrip_hotel_total)) +
          cl('Carro', fmtBRL(r.cotacao_kontrip_carro_valor)) +
          '<div class="cotacao-total">Total: ' + (totKontrip ? fmtBRL(totKontrip) : '—') + '</div>' +
          '</div>';
      } else {
        body += '<div class="cotacao-box"><div class="cotacao-nome">Kontrip</div>' +
          '<div style="color:#aaa;font-size:12px">Cotação pendente</div></div>';
      }

      body += '</div></div>';
    }

    // Vouchers
    if (r.voucher_aereo_link || r.voucher_hotel_link || r.voucher_carro_link) {
      body += '<div class="detail-section">' +
        '<div class="detail-section-title">Vouchers</div>' +
        '<div style="display:flex;gap:10px;flex-wrap:wrap">' +
        (r.voucher_aereo_link ? '<a href="' + r.voucher_aereo_link + '" target="_blank" style="color:#0086FF">Aéreo</a>' : '') +
        (r.voucher_hotel_link ? '<a href="' + r.voucher_hotel_link + '" target="_blank" style="color:#0086FF">Hospedagem</a>' : '') +
        (r.voucher_carro_link ? '<a href="' + r.voucher_carro_link + '" target="_blank" style="color:#0086FF">Carro</a>' : '') +
        '</div></div>';
    }


    document.getElementById('modalBody').innerHTML = body;

    // Botões de ação no modal
    const acoes = montarBotoesAcao(r);
    document.getElementById('modalAcoes').innerHTML = acoes +
      '<button class="btn-acao btn-detalhe" onclick="fecharModal()" style="margin-left:auto">Fechar</button>';

    document.getElementById('modalOverlay').classList.add('open');
  }

  function di(label, value) {
    if (value === undefined || value === null || value === '' || value === false || value === 'false' || value === '—') return '';
    return '<div class="detail-item"><div class="detail-label">' + label + '</div>' +
      '<div class="detail-value">' + value + '</div></div>';
  }
  function cl(label, value) {
    return '<div class="cotacao-linha"><b>' + label + ':</b> ' + (value || '—') + '</div>';
  }

  function fecharModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    _reqAtual = null;
  }
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
  });

  // ── INDICADORES ───────────────────────────────────────────
  function renderIndicadores() {
    const lista = _todasSolicitacoes;
    const agora = new Date();

    // Contagens por status
    const contStatus = {};
    let totalMes = 0, totalAberto = 0, totalConcluido = 0, totalReprovado = 0;
    let totalTastur = 0, totalKontrip = 0;
    const porMes = {}; // 'YYYY-MM' -> count
    const temposPorEtapa = []; // ms desde criado_em até atualizado_em para concluídas

    lista.forEach(function(r) {
      const s = r.status || 'Sem status';
      contStatus[s] = (contStatus[s] || 0) + 1;

      const criado = new Date(r.criado_em || 0);
      const mesKey = criado.getFullYear() + '-' + String(criado.getMonth() + 1).padStart(2,'0');
      const diffMes = (agora - criado) / (1000 * 60 * 60 * 24 * 30);
      if (diffMes <= 1) totalMes++;

      const statusAbertos = ['Pendente Aprovação Liderança','Pendente Pré-Aprovação Setor',
        'Aguardando Cotação','Cotação Parcial','Pendente Aprovação Setor','Aprovada / Aguardando Voucher'];
      if (statusAbertos.includes(s)) totalAberto++;
      if (s === 'Concluída') {
        totalConcluido++;
        const atualizado = new Date(r.atualizado_em || r.criado_em || 0);
        temposPorEtapa.push(atualizado - criado);
      }
      if (s === 'Reprovada') totalReprovado++;
      if (r.agencia_vencedora === 'Tastur') totalTastur++;
      if (r.agencia_vencedora === 'Kontrip') totalKontrip++;

      porMes[mesKey] = (porMes[mesKey] || 0) + 1;
    });

    const tempoMedio = temposPorEtapa.length
      ? Math.round(temposPorEtapa.reduce(function(a,b){ return a+b; },0) / temposPorEtapa.length / (1000*60*60))
      : 0;

    // KPI Cards
    let html = '<div class="indicadores-grid">';
    html += kpi('Total Aberto', totalAberto, 'blue', 'solicitações ativas');
    html += kpi('Este Mês', totalMes, 'yellow', 'novas solicitações');
    html += kpi('Concluídas', totalConcluido, 'green', 'no total');
    html += kpi('Reprovadas', totalReprovado, 'red', 'no total');
    html += kpi('Tastur', totalTastur, 'blue', 'agência vencedora');
    html += kpi('Kontrip', totalKontrip, 'purple', 'agência vencedora');
    if (tempoMedio > 0) html += kpi('Tempo médio', tempoMedio + 'h', 'orange', 'criação → conclusão');
    html += '</div>';

    // Gráfico por status
    const maxStatus = Math.max.apply(null, Object.values(contStatus).concat([1]));
    html += '<div class="chart-section">';
    html += '<div class="chart-card"><div class="chart-title">Por Status</div>';
    Object.entries(contStatus)
      .sort(function(a,b){ return b[1]-a[1]; })
      .forEach(function(entry) {
        const pct = Math.round((entry[1] / maxStatus) * 100);
        html += '<div class="bar-row">' +
          '<div class="bar-label" title="' + entry[0] + '">' + entry[0] + '</div>' +
          '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="bar-count">' + entry[1] + '</div></div>';
      });
    html += '</div>';

    // Gráfico por mês (últimos 6 meses)
    const mesesKeys = Object.keys(porMes).sort().slice(-6);
    const maxMes = Math.max.apply(null, mesesKeys.map(function(k){ return porMes[k]; }).concat([1]));
    html += '<div class="chart-card"><div class="chart-title">Volume Mensal (últimos 6 meses)</div>';
    mesesKeys.forEach(function(k) {
      const partes = k.split('-');
      const nomes = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      const label = nomes[parseInt(partes[1])] + '/' + partes[0].slice(2);
      const pct = Math.round((porMes[k] / maxMes) * 100);
      html += '<div class="bar-row">' +
        '<div class="bar-label">' + label + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:#0086FF"></div></div>' +
        '<div class="bar-count">' + porMes[k] + '</div></div>';
    });
    html += '</div></div>';

    document.getElementById('indicadoresConteudo').innerHTML = html;
  }

  function kpi(label, value, cor, sub) {
    return '<div class="kpi-card ' + cor + '">' +
      '<div class="kpi-label">' + label + '</div>' +
      '<div class="kpi-value">' + value + '</div>' +
      '<div class="kpi-sub">' + sub + '</div>' +
      '</div>';
  }

  // ── Logout ────────────────────────────────────────────────
  function logout() {
    run('logoutUsuario', { token: SESSION_TOKEN }).finally(function() {
      window.top.location.href = WEBAPP_URL;
    });
  }

  // ── Init ──────────────────────────────────────────────────
  carregarSolicitacoes();
</script>
</body>
